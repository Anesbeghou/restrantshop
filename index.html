<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة ومبيعات المطاعم الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pos-container">
        
        <aside class="billing-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-receipt"></i> الفاتورة الحالية</h2>
                <span class="order-type">طاولة رقم 05</span>
            </div>

            <div class="cart-items-container">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>الطلب</th>
                            <th>الكمية</th>
                            <th>السعر</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody">
                    </tbody>
                </table>
            </div>

            <div class="bill-summary">
                <div class="summary-row">
                    <span>مجموع الوجبات:</span>
                    <span id="subtotalPrice">0.00 د.ج</span>
                </div>
                <hr>
                <div class="summary-row total-row">
                    <span>الإجمالي النهائي:</span>
                    <span id="grandTotalPrice">0.00 د.ج</span>
                </div>
            </div>

            <div class="billing-actions">
                <button class="btn-clear" onclick="clearCart()"><i class="fa-solid fa-trash"></i> إلغاء</button>
                <button class="btn-checkout" onclick="checkoutOrder()"><i class="fa-solid fa-cash-register"></i> دفع وحفظ</button>
                <button class="btn-print-only" onclick="directPrint()" title="طباعة الفاتورة الحالية مباشرة للطابعة"><i class="fa-solid fa-print"></i> طباعة</button>
            </div>
        </aside>

        <main class="menu-panel">
            
            <section class="stats-panel">
                <div class="stat-card revenue">
                    <div class="stat-icon"><i class="fa-solid fa-wallet"></i></div>
                    <div class="stat-info">
                        <span>إجمالي أرباح المطعم (الخزينة الصافية)</span>
                        <h2 id="totalEarnings">0.00 د.ج</h2>
                    </div>
                </div>
                <div class="stat-card orders-count">
                    <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="stat-info">
                        <span>الطلبات الناجحة المكتملة</span>
                        <h2 id="completedOrdersCount">0</h2>
                    </div>
                </div>
                <button class="btn-reset-stats" onclick="resetEarnings()" title="تصفير الوردية وبدء مبيعات جديدة">
                    <i class="fa-solid fa-rotate"></i> تصفير اليومية
                </button>
            </section>
            
            <section class="admin-panel">
                <h3><i class="fa-solid fa-folder-plus"></i> إضافة وجبة جديدة إلى قائمة الطعام</h3>
                <div class="admin-form">
                    <input type="text" id="newProductName" placeholder="اسم الوجبة (مثال: شاورما)" required>
                    <input type="number" id="newProductCost" placeholder="التكلفة (د.ج)" step="0.01" required>
                    <input type="number" id="newProductPrice" placeholder="السعر للزبون (د.ج)" step="0.01" required>
                    <select id="newProductCategory">
                        <option value="fastfood">وجبات سريعة</option>
                        <option value="sweets">الحلويات والتحلية</option>
                        <option value="drinks">المشروبات</option>
                    </select>
                    <button onclick="addNewProduct()"><i class="fa-solid fa-plus"></i> إضافة للمنيو</button>
                </div>
            </section>

            <nav class="categories-bar">
                <button class="category-btn active" onclick="filterCategory('all')">الكل</button>
                <button class="category-btn" onclick="filterCategory('fastfood')">الوجبات السريعة</button>
                <button class="category-btn" onclick="filterCategory('sweets')">الحلويات والتحلية</button>
                <button class="category-btn" onclick="filterCategory('drinks')">المشروبات</button>
            </nav>

            <div class="menu-grid" id="menuGrid">
            </div>
        </main>

    </div>

    <div class="invoice-modal" id="invoiceModal">
        <div class="invoice-box">
            <div class="invoice-header">
                <h3>مطعم الوجيز الاحترافي</h3>
                <p>إيصال مبيعات كاشير</p>
            </div>
            <div id="invoiceDetails"></div>
            
            <div class="modal-buttons">
                <button class="btn-modal-print" onclick="printRealInvoice()"><i class="fa-solid fa-print"></i> طباعة الآن ورقياً</button>
                <button class="btn-close-invoice" onclick="closeInvoice()">إنهاء بدون طباعة ورقية</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
